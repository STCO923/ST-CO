<!doctype html>
<html lang="fr">
<head>
<meta charset="utf-8">
<title>T SERVICE & CO — Connexion (maquette)</title>
<meta name="viewport" content="width=device-width,initial-scale=1">
<meta name="theme-color" content="#0A0A0A">
<link rel="icon" href="../lib/favicon.svg?v=4" type="image/svg+xml">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="../fonts.css">
<link rel="stylesheet" href="../theme.css">
<style>
  body {
    min-height: 100vh;
    display: grid;
    place-items: center;
    background:
      radial-gradient(ellipse at top, rgba(201,169,97,0.06), transparent 60%),
      radial-gradient(ellipse at bottom, rgba(201,169,97,0.04), transparent 60%),
      var(--bg-deep);
    position: relative;
    overflow: hidden;
  }
  body::before {
    content:'';
    position: absolute;
    inset: 0;
    background:
      linear-gradient(to bottom, transparent 0%, transparent 95%, rgba(201,169,97,0.2) 100%),
      repeating-linear-gradient(0deg, transparent 0, transparent 60px, rgba(201,169,97,0.015) 60px, rgba(201,169,97,0.015) 61px);
    pointer-events: none;
  }
  .login-wrap {
    width: 100%;
    max-width: 360px;
    padding: 24px 20px;
    z-index: 1;
  }
  .login-logo {
    text-align: center;
    margin-bottom: 20px;
  }
  .login-logo img {
    width: 320px;
    height: auto;
    filter: drop-shadow(0 0 32px rgba(201,169,97,0.22));
  }
  .login-card {
    background: linear-gradient(180deg, var(--bg-surface), var(--bg-elevated));
    border: 1px solid var(--border-gold);
    border-radius: var(--radius-lg);
    padding: 28px 26px;
    box-shadow: var(--shadow-deep), 0 0 50px rgba(201,169,97,0.06);
    position: relative;
  }
  .login-card::before {
    content:'';
    position: absolute;
    top:-1px; left:50%;
    transform: translateX(-50%);
    width: 60%;
    height: 1px;
    background: linear-gradient(90deg, transparent, var(--gold), transparent);
  }
  .login-title {
    font-family: var(--font-serif);
    color: var(--gold);
    font-size: 1rem;
    letter-spacing: var(--tracking-wide);
    text-transform: uppercase;
    text-align: center;
    margin: 0 0 30px;
    font-weight: 500;
  }
  .field { margin-bottom: 18px; }
  .login-actions {
    margin-top: 28px;
    display: flex;
    flex-direction: column;
    gap: 12px;
  }
  .login-actions .btn { width: 100%; padding: 14px; }
  .login-extra {
    margin-top: 18px;
    text-align: center;
    font-size: 0.82rem;
    color: var(--text-muted);
  }
  .footer {
    position: absolute;
    bottom: 24px;
    left: 0; right: 0;
    text-align: center;
    font-family: var(--font-serif);
    font-size: 0.72rem;
    letter-spacing: var(--tracking-wide);
    color: var(--text-faint);
    text-transform: uppercase;
  }
  .footer .slogan {
    color: var(--gold-dim);
    font-style: italic;
    letter-spacing: 0.22em;
    margin-bottom: 6px;
  }
</style>
</head>
<body>
  <div class="login-wrap">
    <div class="login-logo">
      <img src="../lib/logo-full.svg?v=7" alt="T SERVICE & CO SUARL">
    </div>
    <div class="login-card">
      <h2 class="login-title">Espace de connexion</h2>
      <div class="field">
        <label class="label" for="e">Identifiant</label>
        <input type="email" id="e" placeholder="vous@entreprise.com" autocomplete="email">
      </div>
      <div class="field">
        <label class="label" for="p">Mot de passe</label>
        <input type="password" id="p" placeholder="••••••••••" autocomplete="current-password">
      </div>
      <div class="login-actions">
        <button class="btn btn-primary">Se connecter</button>
        <button class="btn btn-ghost">Mot de passe oublié</button>
      </div>
      <div class="login-extra">
        Accès réservé aux entreprises partenaires
      </div>
    </div>
  </div>
  <div class="footer">
    <div class="slogan">T SERVICE PILOTE VOTRE LOGISTIQUE</div>
    <div>© 2026 T SERVICE &amp; CO SUARL · Mentions légales · CGU · Confidentialité</div>
  </div>
</body>
</html>
